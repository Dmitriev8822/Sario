<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Путь именинника — мини-игра</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="game-shell" id="gameShell">
      <button class="editor-toggle" id="editorToggleButton" type="button" aria-expanded="false" aria-controls="gameTopbar">Редактор</button>
      <div class="topbar" id="gameTopbar" aria-hidden="true">
        <div>
          <span class="topbar__label">Собрано</span>
          <strong id="scoreLabel">0 / 0</strong>
        </div>
        <div>
          <span class="topbar__label">Этап</span>
          <strong id="eventLabel">Старт</strong>
        </div>
        <div class="editor-panel" aria-label="Редактор уровня">
          <button class="topbar__button" id="editorModeButton">Редактор</button>
          <select class="editor-panel__select" id="editorLevelSelect" aria-label="Выбрать уровень">
            <option value="">Уровни загружаются…</option>
          </select>
          <select class="editor-panel__select" id="editorToolSelect" aria-label="Что добавить">
            <option value="block">Блок</option>
            <option value="item">Предмет</option>
            <option value="coin">Монетка</option>
            <option value="costume">Костюм</option>
          </select>
          <select class="editor-panel__select" id="editorItemSelect" aria-label="Какой предмет добавить">
            <option value="">Предметы загружаются…</option>
          </select>
          <select class="editor-panel__select" id="editorCostumeSelect" aria-label="На какой костюм сменить игрока">
            <option value="">Костюмы загружаются…</option>
          </select>
          <button class="topbar__button" id="editorExportButton">Экспорт</button>
          <button class="topbar__button" id="editorResetButton">Сброс</button>
          <span class="editor-panel__status" id="editorStatus">Блоков: 0. Предметов: 0.</span>
        </div>
        <button class="topbar__button" id="restartButton">Заново</button>
      </div>

      <div class="photo-placeholder" aria-label="Место для будущего фото"></div>

      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="1280" height="340" aria-label="2D платформер"></canvas>
        <div class="event-card" id="eventCard" hidden>
          <p class="event-card__title" id="eventTitle"></p>
          <p class="event-card__text" id="eventText"></p>
        </div>
      </div>

      <div class="mobile-controls" aria-label="Мобильное управление">
        <button class="mobile-button" data-control="left">←</button>
        <button class="mobile-button" data-control="jump">↑</button>
        <button class="mobile-button" data-control="right">→</button>
      </div>
    </section>

    <section class="finish" id="finishScreen" hidden>
      <div class="finish__card">
        <p class="hero__eyebrow">Финиш</p>
        <h2 id="finishTitle">С днём рождения!</h2>
        <p id="finishText">
          Ты прошёл этот путь. Дальше — ещё больше хороших событий, сильных решений и людей рядом.
        </p>
        <p class="finish__stats" id="finishStats"></p>
        <button class="button button--primary" id="playAgainButton">Пройти ещё раз</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
